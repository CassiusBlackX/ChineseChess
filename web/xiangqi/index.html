<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>中国象棋 WASM Demo</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="layout">
      <section class="panel">
        <h1>中国象棋 · Rust + WASM</h1>
        <p id="status">加载中...</p>
        <div class="toolbar">
          <label>
            模式
            <select id="play-mode">
              <option value="pvp">人人对战</option>
              <option value="pve">人机对战</option>
            </select>
          </label>
          <label>
            难度
            <select id="ai-difficulty">
              <option value="easy">简单</option>
              <option value="medium" selected>中等</option>
              <option value="hard">困难</option>
            </select>
          </label>
          <label>
            执棋
            <select id="human-side">
              <option value="red" selected>执红</option>
              <option value="black">执黑</option>
            </select>
          </label>
          <button id="reset">重开一局</button>
        </div>
      </section>
      <section>
        <div id="board" class="board" aria-label="中国象棋棋盘"></div>
      </section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
